services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kalia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kalia}
      POSTGRES_DB: ${POSTGRES_DB:-kalia_store}
    # Exposed for local development/verification. Remove in production
    # (only nginx should be publicly reachable).
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kalia} -d ${POSTGRES_DB:-kalia_store}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-kalia}:${POSTGRES_PASSWORD:-kalia}@postgres:5432/${POSTGRES_DB:-kalia_store}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/app/worker"]
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-kalia}:${POSTGRES_PASSWORD:-kalia}@postgres:5432/${POSTGRES_DB:-kalia_store}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Reach the API over the internal network.
      BACKEND_URL: http://api:8080
    depends_on:
      - api
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
